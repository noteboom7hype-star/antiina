<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Antiina</title>
  <!-- Ícones do Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      background: #f4f6f9;
    }
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #1f1f1f, #333);
      color: #fff;
      height: 100vh;
      padding-top: 30px;
      box-shadow: 2px 0 8px rgba(0,0,0,0.2);
    }
    .sidebar h2 {
      text-align: center;
      margin-bottom: 20px;
      font-size: 22px;
      letter-spacing: 2px;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      padding: 12px 20px;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.3s;
    }
    .sidebar a i {
      margin-right: 10px;
    }
    .sidebar a:hover {
      background: #444;
      border-left: 4px solid #00aaff;
    }
    .content {
      flex: 1;
      padding: 40px;
      animation: fadeIn 0.5s ease;
    }
    .hidden {
      display: none;
    }
    h1 {
      color: #222;
    }
    button {
      padding: 12px 24px;
      background: #00aaff;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.3s;
    }
    button:hover {
      background: #0077cc;
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Antiina</h2>
    <a href="#" onclick="showPage('home')"><i class="fa fa-home"></i> Home</a>
    <a href="#" onclick="showPage('webtvs')"><i class="fa fa-tv"></i> WebTVS</a>
  </div>
  <div class="content">
    <div id="home">
      <h1>🏠 Bem-vindo ao Antiina</h1>
      <p>Explore as opções no menu lateral para acessar conteúdos exclusivos.</p>
    </div>
    <div id="webtvs" class="hidden">
      <h1>📺 NickOnline</h1>
      <p>Assista ao conteúdo disponível:</p>
      <button onclick="window.open('https://x1co.com.br:8443/', '_blank')">Ver</button>
    </div>
  </div>

  <script>
    function showPage(page) {
      document.getElementById('home').classList.add('hidden');
      document.getElementById('webtvs').classList.add('hidden');
      document.getElementById(page).classList.remove('hidden');
    }
  </script>
</body>
</html>
