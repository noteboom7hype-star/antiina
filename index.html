<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Antiina</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Inter;
background:#0a0f1c;
color:white;
overflow:hidden;
}

/* SPLASH */

#splash{
position:fixed;
width:100%;
height:100%;
background:#0a0f1c;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
transition:.7s;
}

.logo{
font-size:60px;
font-weight:700;
background:linear-gradient(90deg,#00aaff,#66d9ff);
-webkit-background-clip:text;
color:transparent;
}

.typing{
margin:20px;
opacity:.8;
}

/* BOTÃO */

button{
background:linear-gradient(90deg,#00aaff,#0077ff);
border:none;
padding:12px 26px;
border-radius:10px;
color:white;
cursor:pointer;
font-size:16px;
transition:.25s;
}

button:hover{
transform:scale(1.05);
}

/* SIDEBAR */

.sidebar{
position:fixed;
width:230px;
height:100vh;
background:#0d1b2a;
padding-top:30px;
box-shadow:3px 0 15px rgba(0,0,0,.4);
}

.sidebar h2{
text-align:center;
color:#00aaff;
}

/* LINKS SIDEBAR */

.sidebar a{
display:flex;
align-items:center;
gap:12px;
padding:14px 25px;
text-decoration:none;
color:white;
transition:.25s;
cursor:pointer;
position:relative;
}

/* hover deslizando */

.sidebar a:hover{
background:#162c47;
padding-left:32px;
}

/* linha azul lateral */

.sidebar a::before{
content:"";
position:absolute;
left:0;
top:0;
height:100%;
width:0px;
background:#00aaff;
transition:.25s;
}

.sidebar a:hover::before{
width:4px;
}

/* item ativo */

.sidebar a.active{
background:#162c47;
padding-left:32px;
}

.sidebar a.active::before{
width:4px;
}

/* ícones mudam cor ativo */

.sidebar a.active i{
color:#00aaff;
}

/* CONTENT */

.content{
margin-left:230px;
padding:50px;
animation:fade .4s ease;
}

.hidden{
display:none;
}

/* CARD */

.card{
background:#111f36;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.3);
margin-bottom:25px;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* INPUT */

input{
padding:12px;
margin:10px;
background:#0d1b2a;
border:1px solid #24406c;
border-radius:8px;
color:white;
}

/* FOOTER */

footer{
position:fixed;
bottom:10px;
right:15px;
font-size:12px;
opacity:.5;
}

/* ANIMAÇÃO */

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

</style>
</head>

<body>

<!-- SPLASH -->

<div id="splash">

<div class="logo">Antiina</div>

<div class="typing" id="typing"></div>

<button onclick="enter()">Entrar</button>

</div>


<!-- SIDEBAR -->

<div id="sidebar" class="sidebar hidden">

<h2>Antiina</h2>

<a onclick="page('home',this)" class="active">
<i class="fa-solid fa-house"></i> Home
</a>

<a onclick="page('web',this)">
<i class="fa-solid fa-tv"></i> WebTV
</a>

<a onclick="page('rec',this)">
<i class="fa-solid fa-satellite-dish"></i> Receptores
</a>

<a onclick="page('admin',this)">
<i class="fa-solid fa-shield-halved"></i> Admin
</a>

</div>


<!-- CONTENT -->

<div id="content" class="content hidden">


<div id="home">

<div class="card">

<h1>Bem-vindo</h1>

<p>Painel Antiina carregado com sucesso.</p>

</div>

</div>


<div id="web" class="hidden">

<div class="card">

<h1>NickOnline</h1>

<button onclick="window.open('https://x1co.com.br:8443/')">

Abrir player

</button>

</div>

</div>


<div id="rec" class="hidden">

<div class="card">

<h1>Receptores</h1>

<p>Em breve...</p>

</div>

</div>


<div id="admin" class="hidden">

<div class="card">

<h1>Login Admin</h1>

<input id="user" placeholder="Usuário">

<input id="pass" type="password" placeholder="Senha">

<br>

<button onclick="login()">Entrar</button>

<button onclick="logout()">Logout</button>

<div id="painel" class="hidden">

<hr>

<h2>Painel admin ativo</h2>

<p>Status: Online</p>

</div>

</div>

</div>


</div>


<footer>

Antiina v2.2

</footer>


<script>

let texto="The antenna that no one's ever seen";
let i=0;

function digitar(){

if(i<texto.length){

typing.textContent+=texto[i];
i++;

setTimeout(digitar,60);

}

}

window.onload=digitar;



function enter(){

splash.style.opacity=0;

setTimeout(()=>{

splash.style.display="none";

sidebar.classList.remove("hidden");

content.classList.remove("hidden");

},600);

}



function page(p,element){

["home","web","rec","admin"]

.forEach(x=>document.getElementById(x).classList.add("hidden"));

document.getElementById(p).classList.remove("hidden");


document.querySelectorAll(".sidebar a")

.forEach(link=>link.classList.remove("active"));

element.classList.add("active");

}



function login(){

if(user.value=="admin" && pass.value=="admin"){

localStorage.admin=true;

painel.classList.remove("hidden");

alert("Login OK");

}

}



function logout(){

localStorage.removeItem("admin");

painel.classList.add("hidden");

}



if(localStorage.admin){

painel.classList.remove("hidden");

}

</script>

</body>
</html>
